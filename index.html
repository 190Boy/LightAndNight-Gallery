<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光與夜之戀 - 雲端連線圖鑑</title>
    <style>
        /* 這裡保留你原本所有漂亮的 CSS 樣式 (省略以縮短長度) */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #f0f0f0; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #d4af37; margin-bottom: 40px; letter-spacing: 2px; }
        #missing-panel { display: none; background-color: rgba(255, 68, 68, 0.1); border: 2px solid #ff4444; border-radius: 8px; padding: 15px 25px; margin: 0 auto 40px auto; max-width: 1150px; color: #ff8888; }
        #missing-list { list-style-type: none; padding-left: 0; margin-bottom: 0; font-family: monospace; font-size: 1.1em; line-height: 1.6; }
        .timeline-event { max-width: 1200px; margin: 0 auto 60px auto; border-left: 3px solid #d4af37; padding-left: 20px; position: relative; }
        .timeline-event::before { content: ''; position: absolute; left: -9px; top: 0; width: 15px; height: 15px; background-color: #d4af37; border-radius: 50%; }
        .event-title { font-size: 1.8em; color: #d4af37; margin-bottom: 10px; font-weight: bold; }
        .event-meta { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        .meta-tag { background: rgba(212, 175, 55, 0.1); border: 1px solid rgba(212, 175, 55, 0.4); color: #e6c875; padding: 4px 10px; border-radius: 4px; font-size: 0.9em; display: flex; align-items: center; gap: 5px; }
        .char-label { background: rgba(255, 255, 255, 0.12); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; font-weight: bold; }
        .sub-title { font-size: 1.1em; color: #aaa; margin: 25px 0 15px 0; border-bottom: 1px dashed #444; padding-bottom: 8px; letter-spacing: 1px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; align-items: start; }
        .card { background: #1e1e1e; border-radius: 8px; padding: 10px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 12px rgba(0,0,0,0.5); border: 1px solid #333; }
        .card img { width: 100%; height: auto; border-radius: 4px; display: block; }
        .card img.missing-img { border: 2px dashed #ff4444; }
        .card-info { margin-top: 12px; text-align: center; font-size: 0.9em; line-height: 1.4; }
        .card-tag { display: inline-block; background: #333; color: #d4af37; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-top: 5px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.9); }
        .modal-content { margin: 40px auto; display: block; width: 90%; max-width: 800px; }
        .close { position: fixed; top: 20px; right: 35px; color: #f1f1f1; font-size: 40px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1>光與夜之戀 - 典藏圖鑑 (雲端同步版)</h1>
    
    <div id="missing-panel">
        <h3>🚨 系統偵測到以下圖片尚未上傳或檔名錯誤：</h3>
        <ul id="missing-list"></ul>
    </div>

    <div id="timeline-container">正在從 Google 試算表同步資料...</div>

    <div id="imageModal" class="modal" onclick="closeModal(event)">
        <span class="close">&times;</span>
        <img class="modal-content" id="fullImage">
    </div>

    <script>
        // ==========================================
        // 🌟 貼上你在第一步取得的 Google 試算表 CSV 連結 🌟
        // ==========================================
        const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRre_6lIVecnZ7S4EN4qIbiKQgk08-EfmA7ldArCdmpe5_T3R3kCHnL04SfH5lQ3g/pub?gid=2100615640&single=true&output=csv";

        // ==========================================
        // 自動抓取與解析邏輯 (這是關鍵！)
        // ==========================================
        async function fetchAndRender() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                parseAndRender(data);
            } catch (error) {
                document.getElementById('timeline-container').innerHTML = "❌ 無法讀取試算表，請確認發佈設定是否正確。";
                console.error(error);
            }
        }

        function parseAndRender(csvData) {
            // 使用正則表達式解析 CSV，避免逗號衝突
            const rows = csvData.split(/\r?\n/).map(row => {
                const matches = row.match(/(".*?"|[^",\t]+)(?=\s*[,|\t]|\s*$)/g);
                return matches ? matches.map(m => m.replace(/^"|"$/g, '').trim()) : [];
            });

            const groupedData = {};
            let currentMeta = { type: "", days: "", start: "", end: "", rev: "" };

            rows.forEach((cols, index) => {
                if (index === 0 || cols.length < 5) return; // 略過標題和空行

                const character = cols[0];
                let img1 = cols[1];
                let img2 = cols[2];
                const rarity = cols[3];
                const eventName = cols[4];
                const eventType = cols[5];
                const eventDays = cols[6];
                const startDate = cols[7];
                const endDate = cols[8];
                const revenue = cols[9];

                if (!groupedData[eventName]) {
                    groupedData[eventName] = { preCards: [], postCards: [], otherCards: [], metaList: [] };
                }

                const hasMeta = eventType || eventDays || startDate || endDate || revenue;
                if (hasMeta) {
                    currentMeta = { type: eventType, days: eventDays, start: startDate, end: endDate, rev: revenue };
                    groupedData[eventName].metaList.push({ character: character, ...currentMeta });
                }

                if (img1) {
                    let type = (character === "全部") ? "全體總覽 1" : (rarity.includes("三星") ? "活動小卡" : "一段光影");
                    groupedData[eventName].preCards.push({ character, rarity, type, image: img1 });
                }

                if (img2 && currentMeta.type !== '轉盤' && currentMeta.type !== '限時1') {
                    let type = (character === "全部") ? "全體總覽 2" : "二段光影";
                    groupedData[eventName].postCards.push({ character, rarity, type, image: img2 });
                }
            });

            renderHTML(groupedData);
        }

        // 渲染函數 (與之前邏輯相同)
        function renderHTML(groupedData) {
            const container = document.getElementById('timeline-container');
            container.innerHTML = ""; // 清空讀取中文字
            
            for (const [eventName, data] of Object.entries(groupedData)) {
                let metaHtml = ``;
                let renderedSharedMeta = false;

                data.metaList.forEach(meta => {
                    if ((meta.type === '混池' || meta.type === '限時1') && renderedSharedMeta) return;
                    
                    metaHtml += `<div class="event-meta">`;
                    if (meta.type !== '混池' && meta.type !== '限時1' && meta.character) {
                        metaHtml += `<span class="meta-tag char-label">👤 ${meta.character}</span>`;
                    }
                    if (meta.start && meta.end) metaHtml += `<span class="meta-tag">🕒 ${meta.start} ~ ${meta.end} (${meta.days}天)</span>`;
                    if (meta.type) metaHtml += `<span class="meta-tag">🏷️ ${meta.type}</span>`;
                    
                    let rev = meta.rev;
                    let revClean = rev ? rev.replace(/[^0-9]/g, '') : '';
                    if (rev && revClean !== '0' && revClean !== '') {
                        metaHtml += `<span class="meta-tag">💰 營收：${rev}</span>`;
                    }
                    metaHtml += `</div>`;
                    if (meta.type === '混池' || meta.type === '限時1') renderedSharedMeta = true;
                });

                let eventHtml = `<div class="timeline-event"><div class="event-title">${eventName}</div>${metaHtml}`;
                eventHtml += renderGalleryRow(data.preCards, "一段光影", eventName);
                eventHtml += renderGalleryRow(data.postCards, "二段光影", eventName);
                eventHtml += renderGalleryRow(data.otherCards, "活動小卡 / 全體總覽", eventName);
                eventHtml += `</div>`;
                container.innerHTML += eventHtml;
            }
        }

        function renderGalleryRow(cards, title, eventName) {
            if (cards.length === 0) return '';
            let html = `<div class="sub-title">✦ ${title} ✦</div><div class="gallery">`;
            cards.forEach(card => {
                const safeImage = card.image.replace(/'/g, "\\'");
                html += `<div class="card" onclick="openModal('${safeImage}')">
                    <img src="${safeImage}" alt="${card.character}" onerror="reportMissing(this, '${eventName}', '${card.character}', '${card.type}', '${safeImage}')">
                    <div class="card-info"><strong>${card.character}</strong><br><span class="card-tag">${card.rarity} · ${card.type}</span></div>
                </div>`;
            });
            return html + `</div>`;
        }

        window.missingSet = new Set();
        function reportMissing(imgElement, eventName, character, type, filename) {
            imgElement.src = 'https://via.placeholder.com/200x300/220000/ff4444?text=圖片未上傳';
            imgElement.classList.add('missing-img'); 
            document.getElementById('missing-panel').style.display = 'block';
            const errorMsg = `[${eventName}] ${character} (${type}) 找不到檔案：<strong>${filename}</strong>`;
            if (!window.missingSet.has(errorMsg)) {
                window.missingSet.add(errorMsg);
                document.getElementById('missing-list').innerHTML += `<li>${errorMsg}</li>`;
            }
        }

        function openModal(imageSrc) {
            if(imageSrc.includes('via.placeholder.com')) return;
            document.getElementById("imageModal").style.display = "block";
            document.getElementById("fullImage").src = imageSrc;
        }
        function closeModal(event) {
            if (event.target.id === 'imageModal' || event.target.className === 'close') {
                document.getElementById("imageModal").style.display = "none";
            }
        }

        // 啟動抓取
        fetchAndRender();
    </script>
</body>
</html>
