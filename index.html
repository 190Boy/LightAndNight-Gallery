        /* 活動專屬資訊列 */

        .meta-tag { background: rgba(212, 175, 55, 0.1); border: 1px solid rgba(212, 175, 55, 0.4); color: #e6c875; padding: 4px 10px; border-radius: 4px; font-size: 0.9em; display: flex; align-items: center; gap: 5px; }

        /* 子標題 */
        .sub-title { font-size: 1.1em; color: #aaa; margin: 25px 0 15px 0; border-bottom: 1px dashed #444; padding-bottom: 8px; letter-spacing: 1px; }

        /* 圖片畫廊 */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; align-items: start; }
        .card { background: #1e1e1e; border-radius: 8px; padding: 10px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 12px rgba(0,0,0,0.5); border: 1px solid #333; }
        .card img { width: 100%; height: auto; border-radius: 4px; display: block; }
        .card img.missing-img { border: 2px dashed #ff4444; }
        .card-info { margin-top: 12px; text-align: center; font-size: 0.9em; line-height: 1.4; }
        .card-tag { display: inline-block; background: #333; color: #d4af37; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; margin-top: 5px; }
        
        /* 燈箱樣式 */

                    groupedData[eventName].otherCards.push({ character, rarity, type: "全體總覽 2", image: img2 });
                } else {
                    // 🌟 修改：加入限時1的過濾條件
                    if (currentMeta.type !== '轉盤' && currentMeta.type !== '限時1') {
                        groupedData[eventName].postCards.push({ character, rarity, type: "二段光影", image: img2 });
                    }
                }
            }
        });

        // 🚨 缺圖處理函數
        window.missingSet = new Set();
        function reportMissing(imgElement, eventName, character, type, filename) {
            imgElement.src = 'https://via.placeholder.com/200x300/220000/ff4444?text=圖片未上傳';
            imgElement.classList.add('missing-img'); 
            document.getElementById('missing-panel').style.display = 'block';
            const errorMsg = `[${eventName}] ${character} (${type}) 找不到檔案：<strong>${filename}</strong>`;
            if (!window.missingSet.has(errorMsg)) {
                window.missingSet.add(errorMsg);
                document.getElementById('missing-list').innerHTML += `<li>${errorMsg}</li>`;
            }
        }

        function renderGalleryRow(cards, title, eventName) {
            if (cards.length === 0) return '';
            let html = `<div class="sub-title">✦ ${title} ✦</div><div class="gallery">`;
            cards.forEach(card => {
                const safeImage = card.image.replace(/'/g, "\\'");
                html += `
                    <div class="card" onclick="openModal('${safeImage}')">
                        <img src="${safeImage}" alt="${card.character}" 
                             onerror="reportMissing(this, '${eventName}', '${card.character}', '${card.type}', '${safeImage}')">
                        <div class="card-info">
                            <strong>${card.character}</strong><br>
                            <span class="card-tag">${card.rarity} · ${card.type}</span>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;
            return html;
        }

        const container = document.getElementById('timeline-container');
        for (const [eventName, data] of Object.entries(groupedData)) {
            
            // 處理多行標籤資訊
            let metaHtml = ``;
            let renderedSharedMeta = false; // 🌟 新增防呆：用來記錄混池/限時1是否已經印過標籤了

            data.metaList.forEach(meta => {
                // 🌟 如果是混池或限時1，且已經印過一次整體資訊，就直接跳過，防止 Excel 拖曳造成的重複標籤
                if ((meta.type === '混池' || meta.type === '限時1') && renderedSharedMeta) {
                    return; 
                }

                metaHtml += `<div class="event-meta">`;
                
                if (meta.type !== '混池' && meta.type !== '限時1' && meta.character) {
                    metaHtml += `<span class="meta-tag char-label">👤 ${meta.character}</span>`;
                }
                
                if (meta.start && meta.end) {
                    metaHtml += `<span class="meta-tag">🕒 ${meta.start} ~ ${meta.end} (${meta.days}天)</span>`;
                }
                if (meta.type) {
                    metaHtml += `<span class="meta-tag">🏷️ ${meta.type}</span>`;
                }
                
                let rev = meta.rev;
                let isZero = false;
                if (rev) {
                    let revClean = rev.replace(/[^0-9]/g, ''); 
                    if (revClean === '' || parseInt(revClean, 10) === 0) isZero = true;
                }
                
                if (rev && !isZero) {
                    metaHtml += `<span class="meta-tag">💰 營收：${rev}</span>`;
                }
                metaHtml += `</div>`;

                // 標記整體資訊已經印過了
                if (meta.type === '混池' || meta.type === '限時1') {
                    renderedSharedMeta = true;
                }
            });

            let eventHtml = `
                <div class="timeline-event">
                    <div class="event-title">${eventName}</div>
                    ${metaHtml}
            `;
            
            eventHtml += renderGalleryRow(data.preCards, "一段光影", eventName);
            eventHtml += renderGalleryRow(data.postCards, "二段光影", eventName);
            eventHtml += renderGalleryRow(data.otherCards, "活動小卡 / 全體總覽", eventName);

            eventHtml += `</div>`;
            container.innerHTML += eventHtml;
        }

        function openModal(imageSrc) {
            if(imageSrc.includes('via.placeholder.com')) return;
            document.getElementById("imageModal").style.display = "block";
            document.getElementById("fullImage").src = imageSrc;
        }
        function closeModal(event) {
            if (event.target.id === 'imageModal' || event.target.className === 'close') {
                document.getElementById("imageModal").style.display = "none";
            }
        }
    </script>
</body>
</html>
